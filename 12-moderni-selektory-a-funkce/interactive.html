<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interaktivní demo: Moderní selektory a funkce</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #faf5ff; color: #3b0764; }
      main { max-width: 900px; margin: 0 auto; padding: 32px 20px 64px; }
      .panel, .demo { background: white; border-radius: 16px; padding: 20px; margin-top: 20px; }
      .controls { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
      select { padding: 10px; font: inherit; }
      .menu a { display: inline-block; margin-right: 12px; padding: 10px 14px; background: #a855f7; color: white; text-decoration: none; border-radius: 10px; }
      .card { margin-top: 20px; padding: 20px; background: #faf5ff; border-radius: 16px; }
      .placeholder { display: grid; place-items: center; color: white; border-radius: 16px; background: linear-gradient(135deg, #c084fc, #7e22ce); }
      code { background: #f3e8ff; padding: 2px 6px; border-radius: 4px; }
      .placeholder[data-ratio="wide"] { aspect-ratio: 16 / 9; }
      .placeholder[data-ratio="square"] { aspect-ratio: 1 / 1; }
      .placeholder[data-ratio="photo"] { aspect-ratio: 4 / 3; }
      .demo[data-clamp="soft"] #heading { font-size: clamp(2rem, 4vw, 3rem); }
      .demo[data-clamp="strong"] #heading { font-size: clamp(2.5rem, 6vw, 4rem); }
      .card:has(input:checked) { outline: 3px solid #22c55e; }
    </style>
  </head>
  <body>
    <main>
      <h1>Interaktivní demo: Moderní selektory a funkce</h1>
      <p>Zde můžeš přepínat moderní funkce jako <code>:has()</code>, <code>clamp()</code> a <code>aspect-ratio</code>.</p>
      <section class="panel">
        <div class="controls">
          <label>Poměr stran
            <select id="ratio">
              <option value="wide">16 / 9</option>
              <option value="square">1 / 1</option>
              <option value="photo">4 / 3</option>
            </select>
          </label>
          <label>Velikost nadpisu
            <select id="clampMode">
              <option value="soft">mírná</option>
              <option value="strong">výrazná</option>
            </select>
          </label>
          <label>Stav :has()
            <select id="hasState">
              <option value="checked">zaškrtnuto</option>
              <option value="unchecked">nezaškrtnuto</option>
            </select>
          </label>
        </div>
      </section>
      <section class="demo" id="demo" data-clamp="soft">
        <h2 id="heading">Moderní CSS</h2>
        <div class="card" id="hasCard">
          <label><input id="checkbox" type="checkbox" checked /> Souhlasím s podmínkami</label>
        </div>
        <div class="card">
          <div class="placeholder" id="placeholder" data-ratio="wide">Náhled</div>
        </div>
        <p>Aktuální CSS: <code id="output"></code></p>
        <p><a href="./index.html">Zpět na statickou ukázku</a></p>
      </section>
    </main>
    <script>
      const demo = document.querySelector("#demo");
      const ratio = document.querySelector("#ratio");
      const clampMode = document.querySelector("#clampMode");
      const hasState = document.querySelector("#hasState");
      const checkbox = document.querySelector("#checkbox");
      const placeholder = document.querySelector("#placeholder");
      const output = document.querySelector("#output");
      const ratioRules = {
        wide: "16 / 9",
        square: "1 / 1",
        photo: "4 / 3"
      };
      const clampRules = {
        soft: "clamp(2rem, 4vw, 3rem)",
        strong: "clamp(2.5rem, 6vw, 4rem)"
      };
      function render() {
        demo.dataset.clamp = clampMode.value;
        placeholder.dataset.ratio = ratio.value;
        checkbox.checked = hasState.value === "checked";
        output.textContent = `#heading { font-size: ${clampRules[clampMode.value]}; } .placeholder { aspect-ratio: ${ratioRules[ratio.value]}; } .card:has(input:${checkbox.checked ? "checked" : "not(:checked)"}) { ${checkbox.checked ? "outline: 3px solid #22c55e;" : "outline: none;"} }`;
      }
      [ratio, clampMode, hasState].forEach((el) => el.addEventListener("change", render));
      render();
    </script>
  </body>
</html>
