<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typografie a barvy</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <section class="hero">
        <p class="eyebrow">Typografie a barvy</p>
        <h1>Stejné informace, lépe čitelné a přehledné</h1>
        <p class="lead">
          CSS pomáhá vytvořit hierarchii textu, kontrast a příjemné pozadí.
        </p>
      </section>

      <section class="card">
        <h2>Typograficka hierarchie</h2>
        <p>
          Nadpis, podnadpis a běžný text by měly být odlišené velikostí, vahou
          písma i rozestupy.
        </p>
      </section>

      <section class="palette">
        <div class="swatch swatch-one">Primární barva</div>
        <div class="swatch swatch-two">Doplňková barva</div>
        <div class="swatch swatch-three">Akcent</div>
      </section>
    </main>
  </body>
</html>
