<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interaktivní demo: Typografie a barvy</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #eff6ff; color: #1f2937; }
      main { max-width: 900px; margin: 0 auto; padding: 32px 20px 64px; }
      .panel, .demo { background: white; border: 1px solid #bfdbfe; border-radius: 16px; padding: 20px; margin-top: 20px; }
      .controls { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
      select { padding: 10px; font: inherit; }
      .preview { padding: 24px; border-radius: 16px; }
      .preview h2 { margin-top: 0; }
      code { background: #dbeafe; padding: 2px 6px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <main>
      <h1>Interaktivní demo: Typografie a barvy</h1>
      <p>Měň font, velikost textu a barevné schéma. Sleduj, jak to ovlivní čitelnost.</p>
      <section class="panel">
        <div class="controls">
          <label>Font
            <select id="font">
              <option value="Georgia, serif">Georgia</option>
              <option value="Arial, sans-serif">Arial</option>
              <option value="'Courier New', monospace">Courier New</option>
            </select>
          </label>
          <label>Velikost nadpisu
            <select id="size">
              <option value="2rem">2rem</option>
              <option value="2.5rem">2.5rem</option>
              <option value="3rem">3rem</option>
            </select>
          </label>
          <label>Barevné schéma
            <select id="theme">
              <option value="blue">Modré</option>
              <option value="green">Zelené</option>
              <option value="rose">Růžové</option>
            </select>
          </label>
        </div>
      </section>
      <section class="demo">
        <div class="preview" id="preview">
          <h2 id="heading">Čitelný nadpis</h2>
          <p>Typografie vytváří hierarchii, rytmus a pomáhá uživateli rychle číst obsah.</p>
        </div>
        <p>Aktuální CSS: <code id="output"></code></p>
        <p><a href="./index.html">Zpět na statickou ukázku</a></p>
      </section>
    </main>
    <script>
      const font = document.querySelector("#font");
      const size = document.querySelector("#size");
      const theme = document.querySelector("#theme");
      const preview = document.querySelector("#preview");
      const heading = document.querySelector("#heading");
      const output = document.querySelector("#output");
      const themes = {
        blue: ["#eff6ff", "#1d4ed8", "#1e3a8a"],
        green: ["#ecfdf5", "#047857", "#14532d"],
        rose: ["#fff1f2", "#e11d48", "#881337"]
      };
      function render() {
        const [bg, accent, text] = themes[theme.value];
        preview.style.background = bg;
        preview.style.color = text;
        preview.style.fontFamily = font.value;
        heading.style.color = accent;
        heading.style.fontSize = size.value;
        output.textContent = `font-family:${font.value}; font-size:${size.value}; background:${bg}; color:${text};`;
      }
      [font, size, theme].forEach((el) => el.addEventListener("change", render));
      render();
    </script>
  </body>
</html>
