<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formuláře a přístupnost</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <h1>Formuláře a přístupnost</h1>
      <p>
        Důležité je popsat pole, udržet kontrast a zachovat viditelný focus pro
        ovládání klávesnicí.
      </p>

      <form class="form-card">
        <label for="name">Jméno</label>
        <input id="name" name="name" type="text" placeholder="Například Jana" />

        <label for="email">E-mail</label>
        <input
          id="email"
          name="email"
          type="email"
          placeholder="student@example.cz"
        />

        <label for="message">Zpráva</label>
        <textarea id="message" name="message" rows="4"></textarea>

        <button type="submit">Odeslat</button>
      </form>
    </main>
  </body>
</html>
