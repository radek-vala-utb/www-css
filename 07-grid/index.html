<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <h1>CSS Grid</h1>
      <p>
        Grid je vhodný pro dvourozměrné rozložení. Snadno s ním vytvoříme
        sloupce i řádky najednou.
      </p>

      <section class="layout">
        <header class="box header">Header</header>
        <aside class="box sidebar">Sidebar</aside>
        <section class="box content">Obsah</section>
        <footer class="box footer">Footer</footer>
      </section>

      <p>
        Všimni si vlastností <code>grid-template-columns</code>,
        <code>gap</code> a rozmístění přes <code>grid-column</code>.
      </p>
    </main>
  </body>
</html>
